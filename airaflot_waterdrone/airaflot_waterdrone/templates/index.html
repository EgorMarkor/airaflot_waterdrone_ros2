<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Scenario Selector</title>
    
        <!-- Highlight.js styles & script -->
        <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
        <script src="//cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
        <!-- Custom styles -->
        <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    </head>
<body>
<div class="container">
    <h1>Scenario Selector</h1>
    
    <!-- Settings Icon -->
    <button class="settings-icon" onclick="toggleParameters()" title="Toggle Parameters">
        ⚙️
    </button>

    <div class="card">
        <label for="scenario">Select a scenario:</label>
        <select name="scenario" id="scenario" onchange="changeScenario(this.value)">
            {% for scenario in scenario_list %}
                <option value="{{ scenario.name }}" {% if current_scenario and scenario.name == current_scenario.name %}selected{% endif %}>
                    {{ scenario.name }}
                </option>
            {% endfor %}
        </select>
        <div id="scenario-warning" style="color: red; margin-top: 10px; display: none;">
            Stop nodes before changing the scenario.
        </div>
    </div>

    <div class="card status">
        <h2>Active Scenario: <span id="current-scenario" class="">Loading...</span></h2>
        <h3>
            State: <span id="scenario-state" class="">Loading...</span>
            <button id="run-service-btn" style="margin-left: 20px;">Run Service</button>
            <div id="inline-depth-parameter" class="inline-parameter" style="display: none;">
                <label for="depth-input">Default Depth:</label>
                <input type="number" id="depth-input" step="0.1" min="0">
                <button onclick="saveInlineDepthParameter()">Save</button>
            </div>
        </h3>
    </div>

    <div class="card">
        <h2>Nodes and States</h2>
        <div class="button-group">
            <button onclick="fetch('/activate').then(response => response.text()).then(alert)">Run Nodes</button>
            <button onclick="fetch('/deactivate').then(response => response.text()).then(alert)">Stop Nodes</button>
        </div>
        <div id="nodes">Loading...</div>
    </div>

    <div class="modal" id="parameters-modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Parameters</h2>
                <button class="modal-close-btn" onclick="closeParametersModal()">×</button>
            </div>
            <div class="modal-body">
                <div id="parameters">Loading...</div>
            </div>
            <div class="modal-footer">
                <div class="button-group">
                    <button onclick="saveParameters()">Save</button>
                    <button onclick="closeParametersModal()">Close</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Log Files
            <button id="toggle-all-logs" class="show-all-toggle" onclick="toggleAllFolders('log')">Show All Folders</button>
            <button id="refresh-logs" class="show-all-toggle" onclick="refreshLogFiles()">Refresh</button>
        </h2>
        <div class="button-group">
            <label for="log-delete-date">Delete Folders by Date:</label>
            <input type="date" id="log-delete-date" max="2025-06-24">
            <button onclick="deleteLogFoldersByDate()">Delete</button>
        </div>
        <div id="log-files">Loading...</div>
        <div class="file-content-container" id="log-file-content-container">
            <div class="file-content-header">
                <span id="log-file-name">File Content</span>
                <button type="button" class="show-all-toggle" onclick="refreshLogFileContent()">Refresh</button>
                <button class="close-btn" onclick="closeFileContent('log')">×</button>
            </div>
            <div class="file-content-body" id="log-file-content-body"></div>
        </div>
    </div>

    <div class="card">
        <h2>Measurement Files
            <button id="toggle-all-meas" class="show-all-toggle" onclick="toggleAllFolders('meas')">Show All Folders</button>
            <button id="refresh-meas" class="show-all-toggle" onclick="refreshMeasFiles()">Refresh</button>
        </h2>
        <div class="button-group">
            <label for="meas-delete-date">Delete Folders by Date:</label>
            <input type="date" id="meas-delete-date" max="2025-06-24">
            <button onclick="deleteMeasFoldersByDate()">Delete</button>
        </div>
        <div id="meas-files">Loading...</div>
        <div class="file-content-container" id="meas-file-content-container">
            <div class="file-content-header">
                <span id="meas-file-name">File Content</span>
                <button type="button" class="show-all-toggle" onclick="refreshMeasFileContent()">Refresh</button>
                <button class="close-btn" onclick="closeFileContent('meas')">×</button>
            </div>
            <div class="file-content-body" id="meas-file-content-body"></div>
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
